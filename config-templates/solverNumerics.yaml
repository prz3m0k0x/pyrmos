# Solver numerics template
#
# Tune the nonlinear solver tolerances and relaxation factors here.
# Rules:
# - scaledResidual controls the convergence criterion used by the outer loop.
# - reaction source tolerances control equilibrium masking.
# - underRelaxationFactors should usually be between 0 and 1.
# - temperatureClipLow/High prevent runaway temperature updates.
#
# Example pattern:
# scaledResidual: 1e-6
# reactionMassSource:
#   relativeTolerance: 1e-4
#   absoluteTolerance: 1e-10
# reactionHeatSource:
#   relativeTolerance: 1e-4
#   absoluteTolerance: 1e-9
# reactionHeatSourceDerivative:
#   relativeTolerance: 1e-4
#   absoluteTolerance: 1e-9
# underRelaxationFactors:
#   species: 0.25
#   temperature: 0.15
#   heatSource: 0.05
#   massSource: 0.05
# temperatureClipLow: 200
# temperatureClipHigh: 2000
