# Reactor inlet configuration template
#
# Define the inlet geometry and feed conditions.
# Rules:
# - diameter is the reactor inner diameter [m].
# - inletVelocity is the bulk inlet velocity [m/s].
# - inletTemperature is the inlet temperature [K].
# - speciesYInlet gives the inlet mass fractions by species name.
# - Use expression names such as expr1, expr2 only if they are defined in userExpressions.yaml.
#
# Example pattern:
# diameter: 2.5
# inletVelocity: 0.5
# inletTemperature: 690
# speciesYInlet:
#   so2: 0.1
#   so3: 0.0
#   o2: expr1
#   n2: expr2
